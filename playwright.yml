name: AI Browser Automation

on:
  workflow_dispatch:
    inputs:
      steps_json:
        description: 'JSON payload with automation steps and startUrl'
        required: true
        type: string

jobs:
  automate:
    name: Run Playwright Automation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install deps ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Playwright Container (from marketplace) ───────────────────────────
      # Uses: https://github.com/marketplace/actions/playwright-container
      - name: Run Playwright in container
        uses: nicholasgasior/playwright-container@v1
        with:
          run: node playwright-runner.js
        env:
          STEPS_JSON: ${{ inputs.steps_json }}

      # ── Upload results + screenshots ──────────────────────────────────────
      - name: Upload automation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
